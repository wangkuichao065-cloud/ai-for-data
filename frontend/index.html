<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程数据分析平台 - 基于知识图谱与大模型</title>

  <!-- Element Plus CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.0/dist/index.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <!-- Vue 3 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.0/dist/vue.global.prod.js"></script>
  <!-- Vue Router 4 -->
  <script src="https://cdn.jsdelivr.net/npm/vue-router@4.4.0/dist/vue-router.global.prod.js"></script>
  <!-- Element Plus -->
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.9.0/dist/index.full.min.js"></script>
  <!-- Element Plus Icons -->
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <!-- DOMPurify for XSS prevention -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 登录页独立渲染 -->
    <template v-if="!globalState.loggedIn && $route.path === '/login'">
      <router-view v-slot="{ Component }">
        <component :is="Component" />
      </router-view>
    </template>

    <!-- 主框架 -->
    <el-container v-else class="app-container">
      <!-- 侧边栏 -->
      <el-aside :width="isCollapse ? '64px' : '220px'" class="sidebar">
        <div class="logo" @click="$router.push('/')">
          <span class="logo-icon">🧠</span>
          <span v-show="!isCollapse" class="logo-text">数据分析平台</span>
        </div>
        <el-menu
          :default-active="currentRoute"
          :collapse="isCollapse"
          :router="true"
          background-color="transparent"
          text-color="rgba(255,255,255,0.7)"
          active-text-color="#ffffff"
          class="sidebar-menu"
        >
          <el-menu-item v-for="item in menuItems" :key="item.index" :index="item.index">
            <el-icon><component :is="item.icon" /></el-icon>
            <template #title>{{ item.title }}</template>
          </el-menu-item>
        </el-menu>
        <div class="sidebar-footer">
          <el-button text @click="isCollapse = !isCollapse" class="collapse-btn">
            <el-icon><component :is="isCollapse ? 'Expand' : 'Fold'" /></el-icon>
          </el-button>
        </div>
      </el-aside>

      <!-- 主内容区 -->
      <el-container>
        <el-header class="app-header">
          <div class="header-left">
            <h2 class="page-title">{{ pageTitle }}</h2>
          </div>
          <div class="header-right">
            <el-badge :value="announcementCount" :max="99" :hidden="announcementCount === 0" class="header-badge">
              <el-button circle @click="$router.push('/system')">
                <el-icon><component :is="'Bell'" /></el-icon>
              </el-button>
            </el-badge>
            <el-dropdown @command="handleCommand">
              <div class="user-info">
                <el-avatar :size="32" class="user-avatar">
                  {{ (displayName || 'U').charAt(0).toUpperCase() }}
                </el-avatar>
                <span class="user-name">{{ displayName }}</span>
                <el-tag size="small" type="info" style="margin-left:4px;">{{ roleLabel }}</el-tag>
              </div>
              <template #dropdown>
                <el-dropdown-menu>
                  <el-dropdown-item command="profile">
                    <el-icon><component :is="'User'" /></el-icon> 个人设置
                  </el-dropdown-item>
                  <el-dropdown-item command="system">
                    <el-icon><component :is="'Setting'" /></el-icon> 系统管理
                  </el-dropdown-item>
                  <el-dropdown-item command="logout" divided>
                    <el-icon><component :is="'SwitchButton'" /></el-icon> 退出登录
                  </el-dropdown-item>
                </el-dropdown-menu>
              </template>
            </el-dropdown>
          </div>
        </el-header>

        <el-main class="app-main">
          <router-view v-slot="{ Component }">
            <transition name="fade" mode="out-in">
              <component :is="Component" />
            </transition>
          </router-view>
        </el-main>
      </el-container>
    </el-container>
  </div>

  <!-- JS Modules (order matters: dependencies first) -->
  <script src="js/mock-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
